<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 — 소시네엄마표영어</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #FBF6EF; min-height: 100vh; }

        /* ── Login ── */
        .login-wrap {
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .login-box {
            background: #fff; border-radius: 24px; padding: 36px 32px;
            width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,.12);
            border: 2px solid #E8D5B7; text-align: center;
        }
        .login-icon  { font-size: 2.4rem; margin-bottom: 10px; }
        .login-title { font-size: 1.25rem; font-weight: 900; color: #3D2B1F; margin-bottom: 4px; }
        .login-sub   { font-size: .82rem; color: #aaa; margin-bottom: 20px; }
        .login-input {
            width: 100%; border: 1.5px solid #E0E0E0; border-radius: 10px;
            padding: 11px 14px; font-size: .9rem; outline: none; margin-bottom: 10px;
            transition: border-color .2s;
        }
        .login-input:focus { border-color: #FF8C00; }
        .login-btn {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #FF8C00, #FFB347);
            color: #fff; font-size: .95rem; font-weight: 800; cursor: pointer;
        }
        .login-err { color: #e53935; font-size: .82rem; margin-top: 8px; }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #FF8C00, #FFB347);
            padding: 20px 28px; color: #fff;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header h1  { font-size: 1.3rem; font-weight: 900; }
        .header p   { font-size: .82rem; opacity: .85; margin-top: 3px; }
        .refresh-btn {
            background: rgba(255,255,255,.22); border: none; border-radius: 12px;
            padding: 8px 16px; color: #fff; font-size: .82rem; font-weight: 700;
            cursor: pointer; transition: background .2s;
        }
        .refresh-btn:hover { background: rgba(255,255,255,.36); }

        /* ── Container ── */
        .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px 40px; }

        /* ── Stats ── */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 14px; margin-bottom: 22px;
        }
        .stat-card {
            background: #fff; border-radius: 18px; padding: 18px 20px;
            border: 2px solid #E8D5B7; box-shadow: 0 4px 16px rgba(200,169,126,.14);
        }
        .stat-label { font-size: .72rem; color: #8B6F5E; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .stat-value { font-size: 2.2rem; font-weight: 900; color: #FF8C00; line-height: 1; }
        .stat-sub   { font-size: .72rem; color: #bbb; margin-top: 6px; }

        /* ── Cards ── */
        .card {
            background: #fff; border-radius: 18px; padding: 22px 20px;
            border: 2px solid #E8D5B7; box-shadow: 0 4px 16px rgba(200,169,126,.14);
            margin-bottom: 18px;
        }
        .card-title { font-size: 1rem; font-weight: 800; color: #3D2B1F; margin-bottom: 16px; }

        /* ── Table ── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; font-size: .72rem; font-weight: 800; color: #8B6F5E;
            text-transform: uppercase; letter-spacing: 1px;
            padding: 8px 12px; border-bottom: 2px solid #F0E8DC;
        }
        td { padding: 11px 12px; font-size: .88rem; color: #3D2B1F; border-bottom: 1px solid #F5EDE0; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #FFF8F0; }
        .empty { text-align: center; color: #bbb; padding: 36px; font-size: .88rem; }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: .72rem; font-weight: 800;
            background: #FFF3E0; color: #FF8C00;
        }

        .stat-card.users { border-color: #B2DFDB; }
        .stat-card.users .stat-value { color: #00897B; }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .header { flex-direction: column; gap: 10px; align-items: flex-start; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
    <div class="login-box">
        <div class="login-icon">🔐</div>
        <div class="login-title">관리자 로그인</div>
        <div class="login-sub">소시네엄마표영어 대시보드</div>
        <input class="login-input" id="pwInput" type="password" placeholder="비밀번호"
            onkeydown="if(event.key==='Enter') checkLogin()">
        <button class="login-btn" onclick="checkLogin()">로그인</button>
        <div class="login-err" id="loginErr"></div>
    </div>
</div>

<!-- 대시보드 -->
<div id="dashboard" style="display:none">
    <div class="header">
        <div>
            <h1>📊 관리자 대시보드</h1>
            <p>소시네엄마표영어 — 실시간 현황</p>
        </div>
        <button class="refresh-btn" onclick="loadDashboard()">🔄 새로고침</button>
    </div>

    <div class="container">

        <!-- 통계 카드 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">소식 신청자</div>
                <div class="stat-value" id="totalSignups">—</div>
                <div class="stat-sub">누적 이메일 신청</div>
            </div>
            <div class="stat-card users">
                <div class="stat-label">등록 사용자</div>
                <div class="stat-value" id="totalUsers">—</div>
                <div class="stat-sub">이름 등록한 전체</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">총 완료 수</div>
                <div class="stat-value" id="totalCompletions">—</div>
                <div class="stat-sub">전체 누적 Day 완료</div>
            </div>
        </div>

        <!-- 소식 신청자 테이블 -->
        <div class="card">
            <div class="card-title">📬 소식 신청자 목록</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>이메일</th>
                            <th>신청일</th>
                        </tr>
                    </thead>
                    <tbody id="signupsBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 사용자 진도 테이블 -->
        <div class="card">
            <div class="card-title">📊 사용자별 진도</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>이름</th>
                            <th>완료 Day</th>
                            <th>시작일</th>
                            <th>마지막 활동</th>
                        </tr>
                    </thead>
                    <tbody id="plansBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="__env.js"></script>
<script src="lib/supabase.js"></script>
<script>
const ADMIN_PW_HASH = '324cc2001745e165a7caf3d79b00918e087e2b0885b682294b441b6cee92de8e';

async function hashPassword(pw) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkLogin() {
    const pw   = document.getElementById('pwInput').value;
    const hash = await hashPassword(pw);
    if (hash === ADMIN_PW_HASH) {
        document.getElementById('loginWrap').style.display  = 'none';
        document.getElementById('dashboard').style.display  = 'block';
        loadDashboard();
    } else {
        document.getElementById('loginErr').textContent = '비밀번호가 틀렸습니다';
    }
}

function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

async function loadDashboard() {
    document.getElementById('totalSignups').textContent     = '…';
    document.getElementById('totalUsers').textContent       = '…';
    document.getElementById('totalCompletions').textContent = '…';

    if (!window.__supabase) {
        document.getElementById('signupsBody').innerHTML =
            '<tr><td colspan="3" class="empty">Supabase 연결이 필요합니다</td></tr>';
        document.getElementById('plansBody').innerHTML =
            '<tr><td colspan="4" class="empty">Supabase 연결이 필요합니다</td></tr>';
        return;
    }

    // 신청자 목록
    const { data: signups } = await window.__supabase
        .from('signups').select('*').order('created_at', { ascending: false });

    document.getElementById('totalSignups').textContent = signups ? signups.length : 0;

    const signupsBody = document.getElementById('signupsBody');
    if (!signups || signups.length === 0) {
        signupsBody.innerHTML = '<tr><td colspan="3" class="empty">아직 신청자가 없어요 📭</td></tr>';
    } else {
        signupsBody.innerHTML = signups.map((s, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${s.name}</td>
                <td>${fmtDate(s.created_at)}</td>
            </tr>`).join('');
    }

    // 사용자 진도
    const { data: plans } = await window.__supabase
        .from('plans').select('*').order('updated_at', { ascending: false });

    document.getElementById('totalUsers').textContent = plans ? plans.length : 0;

    const totalDone = plans ? plans.reduce((sum, p) => sum + (p.done_days ? p.done_days.length : 0), 0) : 0;
    document.getElementById('totalCompletions').textContent = totalDone;

    const plansBody = document.getElementById('plansBody');
    if (!plans || plans.length === 0) {
        plansBody.innerHTML = '<tr><td colspan="4" class="empty">아직 등록된 사용자가 없어요</td></tr>';
    } else {
        plansBody.innerHTML = plans.map(p => `
            <tr>
                <td><strong>${p.user_id}</strong></td>
                <td><span class="badge">${p.done_days ? p.done_days.length : 0} / 14일</span></td>
                <td>${fmtDate(p.start_date)}</td>
                <td>${fmtDate(p.updated_at)}</td>
            </tr>`).join('');
    }
}
</script>

</body>
</html>
