<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>소시네 여름방학 주간시간표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  @page { size: A4 landscape; margin: 14mm 14mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jua', 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
    background: #EDEDED; color: #333;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
    padding: 14px 0 40px;
  }

  .sheet { width: 269mm; margin: 0 auto; background: #fff; }

  .toolbar { width: 269mm; margin: 0 auto 10px; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
  .btn { font-family: inherit; font-size: 13px; font-weight: 800; cursor: pointer; border: none; border-radius: 20px; padding: 9px 18px; background: linear-gradient(135deg, #FF8C00, #FFB347); color: #fff; box-shadow: 0 3px 10px rgba(200,140,0,.28); }
  .btn.secondary { background: #fff; color: #666; border: 1px solid #ccc; }
  @media print { .toolbar, .no-print { display: none !important; } body { padding: 0; background: #fff; } .sheet { width: 269mm; } }

  [contenteditable="true"] { outline: none; }
  [contenteditable="true"]:hover { background: #FAFAFA; }
  [contenteditable="true"]:focus { background: #F5F8FF; box-shadow: 0 0 0 1.5px #9DB8FF inset; }

  .title-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .title-main { font-size: 16pt; font-weight: 800; color: #333; }
  .title-sub { font-size: 9pt; color: #999; font-weight: 600; display: flex; gap: 6px; align-items: center; }
  .title-sub .fill { border-bottom: 1px solid #ccc; padding: 0 3px; min-width: 60px; text-align: center; }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td { border: 1px solid #DDD; text-align: center; }

  /* ── Hourly table ── */
  .hour-table thead th { font-size: 8.5pt; font-weight: 700; padding: 4px 2px; color: #333; }
  .hour-table thead th.sun { color: #C2603D; }
  .hour-table thead th.sat { color: #5B6BBF; }
  .hour-table .hour-label-col { width: 20mm; }
  .hour-table td.hour-label { font-size: 7pt; color: #999; font-weight: 700; }
  .hour-table td.slot { height: 6mm; padding: 0 3px; }
  .hour-table td.slot .slot-text { font-size: 7.2pt; min-height: 8pt; color: #333; }

  .section-gap { height: 10px; }

  /* ── Subject table ── */
  .subj-table { margin-top: 14px; }
  .subj-table th { font-size: 8.5pt; font-weight: 700; padding: 4px 2px; color: #333; }
  .subj-table .row-label-col { width: 16mm; }
  .subj-table td.row-label { font-size: 8.5pt; font-weight: 800; color: #333; background: #FAFAFA; }
  .subj-table td.subj-cell { height: 20mm; vertical-align: top; padding: 4px 6px; text-align: left; }
  .subj-table td.subj-cell .subj-text { font-size: 8pt; line-height: 1.6; color: #333; min-height: 100%; white-space: pre-wrap; }
</style>
</head>
<body>

<div class="toolbar no-print">
  <button class="btn secondary" onclick="location.reload()">전체 초기화</button>
  <button class="btn" onclick="window.print()">🖨️ 인쇄하기</button>
</div>

<div class="sheet">

  <div class="title-row">
    <div class="title-main">이번 주 시간표</div>
    <div class="title-sub">기간 <span class="fill" contenteditable="true">&nbsp;</span> ~ <span class="fill" contenteditable="true">&nbsp;</span></div>
  </div>

  <table class="hour-table">
    <colgroup>
      <col class="hour-label-col"><col><col><col><col><col><col><col>
    </colgroup>
    <thead>
      <tr>
        <th>&nbsp;</th>
        <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
        <th class="sat">토</th><th class="sun">일</th>
      </tr>
    </thead>
    <tbody id="hourBody"></tbody>
  </table>

  <div class="section-gap"></div>

  <table class="subj-table">
    <colgroup>
      <col class="row-label-col"><col><col><col><col><col><col>
    </colgroup>
    <thead>
      <tr>
        <th>&nbsp;</th>
        <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토 / 일</th>
      </tr>
    </thead>
    <tbody id="subjBody"></tbody>
  </table>

</div>

<script>
  function makeSlotCell() {
    const td = document.createElement('td');
    td.className = 'slot';
    const span = document.createElement('span');
    span.className = 'slot-text';
    span.contentEditable = 'true';
    span.innerHTML = '&nbsp;';
    td.appendChild(span);
    return td;
  }

  function buildHourTable() {
    const body = document.getElementById('hourBody');
    body.innerHTML = '';
    for (let h = 7; h <= 21; h++) {
      const tr = document.createElement('tr');
      const labelTd = document.createElement('td');
      labelTd.className = 'hour-label';
      labelTd.textContent = h + ':00';
      tr.appendChild(labelTd);
      for (let c = 0; c < 7; c++) tr.appendChild(makeSlotCell());
      body.appendChild(tr);
    }
  }

  function buildSubjTable() {
    const body = document.getElementById('subjBody');
    body.innerHTML = '';
    ['오전', '오후', '저녁'].forEach(label => {
      const tr = document.createElement('tr');
      const labelTd = document.createElement('td');
      labelTd.className = 'row-label';
      labelTd.textContent = label;
      tr.appendChild(labelTd);
      for (let c = 0; c < 6; c++) {
        const td = document.createElement('td');
        td.className = 'subj-cell';
        const div = document.createElement('div');
        div.className = 'subj-text';
        div.contentEditable = 'true';
        div.innerHTML = '&nbsp;';
        td.appendChild(div);
        tr.appendChild(td);
      }
      body.appendChild(tr);
    });
  }

  buildHourTable();
  buildSubjTable();
</script>

</body>
</html>
